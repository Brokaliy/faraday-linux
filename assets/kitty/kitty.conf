# =============================================================================
# Faraday Linux — Kitty Terminal Configuration
# Color scheme: Faraday dark (background #0a0d14, cyan #7dcfff)
# This file is the canonical source — home.nix reads it at build time.
# =============================================================================

# =============================================================================
# FONT
# =============================================================================
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# Enable font ligatures (→, !=, >=, etc.)
disable_ligatures never

# Slightly increase line spacing for readability
adjust_line_height  2
adjust_column_width 0

# =============================================================================
# COLORS — Faraday Dark
# Background: #0a0d14 (deep space blue-black)
# Foreground: #c0caf5 (soft lavender-white, easy on eyes)
# Accent:     #7dcfff (bright cyan)
# Highlight:  #1a1f2e (deep blue — selection, inactive tabs)
# =============================================================================

# Backgrounds
background            #0a0d14
foreground            #c0caf5
selection_background  #1a1f2e
selection_foreground  #7dcfff
cursor                #7dcfff
cursor_text_color     #0a0d14
url_color             #7dcfff

# Tab bar colors (defined in tab_bar section below)
active_tab_background   #7dcfff
active_tab_foreground   #0a0d14
inactive_tab_background #1a1f2e
inactive_tab_foreground #4a6fa5

# --- 16 ANSI colors ---
# Black
color0  #0d1117
color8  #1a2035
# Red
color1  #f7768e
color9  #ff9e9e
# Green
color2  #9ece6a
color10 #b9e083
# Yellow
color3  #e0af68
color11 #ffd28f
# Blue (maps to #4a9eff instead of standard blue — more readable)
color4  #4a9eff
color12 #7dcfff
# Magenta
color5  #bb9af7
color13 #caa9fa
# Cyan
color6  #7dcfff
color14 #a9daff
# White
color7  #c0caf5
color15 #e0f0ff

# =============================================================================
# WINDOW
# =============================================================================
window_padding_width    12 10

# Transparency — 0.95 is barely-there blur without obscuring text
background_opacity      0.95

# Kitty tells Hyprland to apply blur to its window via the class hint
# (Hyprland reads this and applies blur rules — see hyprland.conf)
dynamic_background_color no

# Remember window size
remember_window_size  yes
initial_window_width  900
initial_window_height 600

# =============================================================================
# TAB BAR
# Shows only tab index and title — clean, minimal
# =============================================================================
tab_bar_edge             top
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_bar_align            left

# Format: "  1: zsh  " — index then truncated title
active_tab_title_template   " {index}: {title[:20]} "
inactive_tab_title_template " {index}: {title[:20]} "

tab_bar_background #0a0d14

# =============================================================================
# SCROLLBACK
# =============================================================================
scrollback_lines        10000
scrollback_pager        bat --paging=always --theme=base16 -l bash
scrollback_pager_history_size 0

# =============================================================================
# KEYBOARD SHORTCUTS
# Faraday-specific bindings — override kitty defaults where needed
# =============================================================================

# Disable all defaults first so we can define exactly what we want
clear_all_shortcuts no

# -- Tabs --
map ctrl+t         new_tab_with_cwd
map ctrl+w         close_tab
map ctrl+tab       next_tab
map ctrl+shift+tab previous_tab
map ctrl+1         goto_tab 1
map ctrl+2         goto_tab 2
map ctrl+3         goto_tab 3
map ctrl+4         goto_tab 4
map ctrl+5         goto_tab 5

# -- Splits (kitty "windows" within a tab) --
# Vertical split   = side-by-side panes
map ctrl+\         launch --location=vsplit --cwd=current
# Horizontal split = top/bottom panes
map ctrl+minus     launch --location=hsplit --cwd=current

# Navigate between splits
map ctrl+left      neighboring_window left
map ctrl+right     neighboring_window right
map ctrl+up        neighboring_window up
map ctrl+down      neighboring_window down

# Resize splits
map ctrl+shift+left  resize_window narrower 3
map ctrl+shift+right resize_window wider 3
map ctrl+shift+up    resize_window taller 3
map ctrl+shift+down  resize_window shorter 3

# -- Copy / Paste --
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard
map ctrl+shift+s    paste_from_selection

# -- Font size --
map ctrl+equal      change_font_size all +1.0
map ctrl+minus      change_font_size all -1.0
map ctrl+0          change_font_size all 0

# -- Scrollback --
map ctrl+shift+k    scroll_line_up
map ctrl+shift+j    scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home  scroll_home
map ctrl+shift+end   scroll_end

# -- URLs --
map ctrl+shift+e    open_url_with_hints

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay       8         # ~120fps max
input_delay         2
sync_to_monitor     yes

# =============================================================================
# MISC
# =============================================================================
enable_audio_bell       no
visual_bell_duration    0.0
window_alert_on_bell    yes

# Close window without prompt when shell exits cleanly
confirm_os_window_close 0

# Kitty window class — used by Hyprland for blur/opacity rules
linux_display_server wayland
wayland_titlebar_color background

# Shell — use fish if available, fallback to zsh
# shell /run/current-system/sw/bin/fish
# Uncomment above to always launch fish. Otherwise inherits user's default shell.
