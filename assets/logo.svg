<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Faraday Linux logo — Faraday cage pattern with F letterform -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0e1a" rx="16"/>

  <!-- Faraday cage grid (outer frame) -->
  <rect x="15" y="15" width="170" height="170" fill="none"
        stroke="#00d4ff" stroke-width="2" rx="4" filter="url(#glow)"/>

  <!-- Vertical grid wires -->
  <g stroke="#00d4ff22" stroke-width="1">
    <line x1="45" y1="15" x2="45" y2="185"/>
    <line x1="75" y1="15" x2="75" y2="185"/>
    <line x1="105" y1="15" x2="105" y2="185"/>
    <line x1="135" y1="15" x2="135" y2="185"/>
    <line x1="165" y1="15" x2="165" y2="185"/>
  </g>

  <!-- Horizontal grid wires -->
  <g stroke="#00d4ff22" stroke-width="1">
    <line x1="15" y1="45" x2="185" y2="45"/>
    <line x1="15" y1="75" x2="185" y2="75"/>
    <line x1="15" y1="105" x2="185" y2="105"/>
    <line x1="15" y1="135" x2="185" y2="135"/>
    <line x1="15" y1="165" x2="185" y2="165"/>
  </g>

  <!-- F letterform — bold cyan -->
  <text x="52" y="138"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="96" font-weight="900"
        fill="#00d4ff"
        filter="url(#glow)">F</text>

  <!-- Corner dots (cage nodes) -->
  <g fill="#00d4ff" opacity="0.8">
    <circle cx="15" cy="15" r="3"/>
    <circle cx="185" cy="15" r="3"/>
    <circle cx="15" cy="185" r="3"/>
    <circle cx="185" cy="185" r="3"/>
  </g>
</svg>
